name: ble_srv
version: "1.2.2"
description: BLE device management and OTA service for ESP32 using NimBLE
url: https://github.com/your-org/esp-idf-ble-srv
license: Apache-2.0

repository: https://github.com/your-org/esp-idf-ble-srv.git
issues: https://github.com/your-org/esp-idf-ble-srv/issues

targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c2
  - esp32c3
  - esp32c5
  - esp32c6
  - esp32c61
  - esp32h2
  - esp32p4

dependencies:
  idf:
    version: ">=6.0"
  MichMich/esp-idf-wifi-provisioner: '*'
  